<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexari Player — Pairing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }

    .pairing-container {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; width: 420px;
    }

    .logo img { width: 160px; opacity: 0.95; }

    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.01em; }

    /* ── Pairing code ── */
    .pairing-code-container { text-align: center; }
    .pairing-label { font-size: 0.82rem; color: #94a3b8; margin-bottom: 10px; }
    .pairing-code {
      font-family: 'Courier New', monospace;
      font-size: 3rem; font-weight: 700; letter-spacing: 0.22em;
      color: #a5b4fc; background: #1e293b;
      border: 2px solid #334155; border-radius: 14px;
      padding: 16px 32px; min-width: 280px; text-align: center;
    }
    .pairing-status {
      margin-top: 10px; font-size: 0.82rem; color: #94a3b8; min-height: 1.2em;
    }
    .pairing-status.error { color: #f87171; }
    .pairing-status.success { color: #4ade80; }

    /* ── Device info ── */
    .device-info {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
      width: 100%; padding: 12px 16px;
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
    }
    .info-item { font-size: 0.78rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .info-item span { color: #cbd5e1; }

    /* ── Connection settings ── */
    .conn-settings-wrap { width: 100%; }
    .conn-settings-toggle {
      width: 100%; background: #1e293b; color: #94a3b8;
      border: 1px solid #334155; border-radius: 10px;
      padding: 9px 16px; font-size: 0.82rem; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .conn-settings-toggle:hover { background: #253348; }
    .conn-settings-toggle.open { border-radius: 10px 10px 0 0; }

    .conn-settings-panel {
      background: #1a2540; border: 1px solid #334155; border-top: none;
      border-radius: 0 0 10px 10px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .conn-settings-panel.hidden { display: none; }

    .conn-hint { font-size: 0.75rem; color: #64748b; }
    .conn-field { display: flex; flex-direction: column; gap: 4px; }
    .conn-field label { font-size: 0.78rem; color: #94a3b8; }
    .conn-field input {
      background: #0f172a; border: 1px solid #334155; border-radius: 7px;
      color: #f1f5f9; padding: 8px 12px; font-size: 0.88rem; outline: none; width: 100%;
    }
    .conn-field input:focus { border-color: #6366f1; }
    .conn-actions { display: flex; gap: 8px; }
    .conn-btn {
      flex: 1; padding: 8px; font-size: 0.82rem; border: none;
      border-radius: 7px; cursor: pointer; font-weight: 500;
    }
    .conn-btn-apply { background: #6366f1; color: #fff; }
    .conn-btn-apply:hover { background: #4f46e5; }
    .conn-btn-reset { background: #334155; color: #94a3b8; }
    .conn-btn-reset:hover { background: #3f5068; }
    .conn-msg { font-size: 0.78rem; color: #4ade80; min-height: 1em; }
  </style>
</head>
<body>
  <div class="pairing-container">

    <div class="logo">
      <img src="./nexari.png" alt="Nexari" />
    </div>

    <h1>Nexari Player</h1>
    <div id="player-version" style="font-size:0.75rem;color:#475569;letter-spacing:0.04em;margin-top:-8px">v—</div>

    <div class="pairing-code-container">
      <p class="pairing-label">Enter this code in your dashboard:</p>
      <div id="pairing-code" class="pairing-code">------</div>
      <div id="pairing-status" class="pairing-status">Generating code…</div>
    </div>

    <div class="device-info">
      <div class="info-item">Hostname: <span id="device-hostname">…</span></div>
      <div class="info-item">IP: <span id="device-ip">…</span></div>
      <div class="info-item">OS: <span id="device-os">…</span></div>
      <div class="info-item">CPU: <span id="device-cpu">…</span></div>
    </div>

    <!-- Connection settings (collapsible) -->
    <div class="conn-settings-wrap">
      <button id="conn-settings-toggle" class="conn-settings-toggle">
        <span>⚙ Connection settings</span>
        <span id="conn-arrow">▾</span>
      </button>
      <div id="conn-settings-panel" class="conn-settings-panel hidden">
        <p class="conn-hint">Change the backend API URL the device connects to.</p>
        <div class="conn-field">
          <label for="input-api-base">CMS / API Base URL</label>
          <input id="input-api-base" type="url" spellcheck="false" placeholder="https://your-platform-domain/api/v1" />
        </div>
        <div class="conn-actions">
          <button class="conn-btn conn-btn-apply" id="btn-save">Save &amp; Reconnect</button>
          <button class="conn-btn conn-btn-reset" id="btn-reset">Reset to Default</button>
        </div>
        <div class="conn-msg" id="conn-msg"></div>
      </div>
    </div>

  </div>

  <script type="module" src="./pairing.ts"></script>
</body>
</html>
