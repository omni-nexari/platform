<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexari Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player-root {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    #update-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); color: #fff; font-family: 'Segoe UI', sans-serif;
      font-size: 13px; padding: 6px 12px; display: none; z-index: 9999;
    }
    #update-banner.visible { display: block; }

    /* ── Idle screen (matches nexari-tizen) ─────────────────────────────── */
    .idle-screen {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 70% 55% at 20% -10%, rgba(58,123,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 110%, rgba(79,242,209,0.14) 0%, transparent 55%),
        linear-gradient(180deg, #0a0d14 0%, #050709 100%);
    }
    .idle-bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 75%);
      pointer-events: none;
    }
    .idle-card {
      position: relative; z-index: 1;
      padding: 56px 72px; border-radius: 24px;
      background: linear-gradient(180deg, rgba(20,26,38,0.82) 0%, rgba(12,16,24,0.82) 100%);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 30px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
      text-align: center; max-width: 640px; width: 86%;
    }
    .idle-brand {
      display: flex; align-items: center; justify-content: center;
      gap: 18px; margin-bottom: 22px;
    }
    .idle-logo { width: 56px; height: 56px; filter: drop-shadow(0 4px 18px rgba(58,123,255,0.45)); }
    .idle-wordmark {
      font-size: 38px; font-weight: 700; letter-spacing: 6px;
      background: linear-gradient(90deg, #ffffff 0%, #b9c4d4 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .idle-device {
      font-size: 14px; font-weight: 500; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 24px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .idle-divider {
      height: 1px; width: 100%; margin: 4px 0 22px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
    }
    .idle-status-row {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.7); font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .idle-status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4ff2d1;
      box-shadow: 0 0 0 0 rgba(79,242,209,0.6);
      animation: idleDotPulse 1.8s ease-out infinite;
    }
    @keyframes idleDotPulse {
      0%   { box-shadow: 0 0 0 0 rgba(79,242,209,0.55); }
      70%  { box-shadow: 0 0 0 12px rgba(79,242,209,0); }
      100% { box-shadow: 0 0 0 0 rgba(79,242,209,0); }
    }
    .idle-footer {
      position: absolute; bottom: 32px; left: 0; right: 0; text-align: center;
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.28); z-index: 1;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <div id="player-root"></div>
  <div id="update-banner"></div>
  <script type="module" src="./player.ts"></script>
</body>
</html>
