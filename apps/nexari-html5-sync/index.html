<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nexari HTML5 Sync</title>
  <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
  <script type="text/javascript" src="$B2BAPIS/b2bapis/b2bapis.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: monospace; overflow: hidden; }

    #player-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
    #player-container video { width: 100%; height: 100%; object-fit: cover; }

    #overlay {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 16px 28px 20px;
      pointer-events: none;
    }
    #device-info  { font-size: 12px; color: #555; margin-bottom: 3px; }
    #engine-mode  { font-size: 13px; color: #4fa; font-weight: bold; margin-bottom: 4px; }
    #status       { font-size: 20px; color: #4cf; font-weight: bold; min-height: 26px; }

    #log-panel {
      position: fixed; top: 0; right: 0; width: 580px; height: 100%; z-index: 20;
      background: rgba(0,0,0,0.82);
      padding: 10px 14px;
      font-size: 12px; line-height: 1.75; overflow-y: auto;
      border-left: 1px solid #1a1a1a;
    }
    #log-panel-title {
      font-size: 11px; color: #444; border-bottom: 1px solid #1a1a1a;
      padding-bottom: 6px; margin-bottom: 6px; letter-spacing: 0.05em;
    }
    .l-info  { color: #7ad; }
    .l-warn  { color: #fa4; }
    .l-error { color: #f55; }
    .l-drift { color: #4f8; }
    .l-ts    { color: #444; margin-right: 4px; }
  </style>
</head>
<body>
  <div id="player-container"></div>

  <div id="overlay">
    <div id="device-info">Nexari HTML5 Sync — initialising</div>
    <div id="engine-mode">MSE+WASM</div>
    <div id="status">Starting…</div>
  </div>

  <div id="log-panel">
    <div id="log-panel-title">NEXARI HTML5 SYNC — LIVE LOGS</div>
  </div>

  <script src="js/bundle.js"></script>
</body>
</html>
