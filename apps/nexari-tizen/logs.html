<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexari Signage Logs</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/logs.css">
</head>
<body class="log-export-page">
    <div class="log-export-shell">
        <div class="log-export-card">
            <div class="log-export-header">
                <div>
                    <div class="log-export-eyebrow">Tizen Player</div>
                    <h1>Log Export</h1>
                    <p class="log-export-subtitle">Plain text view of the persisted player console so logs can be selected and copied.</p>
                </div>
                <div class="log-export-actions">
                    <button id="log-refresh-button" class="log-export-button secondary" type="button">Refresh</button>
                    <button id="log-copy-button" class="log-export-button primary" type="button">Copy All</button>
                    <button id="log-clear-button" class="log-export-button danger" type="button">Clear</button>
                    <button id="log-back-button" class="log-export-button secondary" type="button">Back</button>
                </div>
            </div>

            <div class="log-export-meta">
                <span id="log-export-status">Loading logs...</span>
                <span class="log-export-hint">MENU or RETURN goes back to player</span>
            </div>

            <textarea id="log-export-text" class="log-export-text" readonly spellcheck="false"></textarea>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/log-viewer.js"></script>
</body>
</html>
