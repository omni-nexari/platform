<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tizen B2B API Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0d11;
      color: #e8eaf0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      padding: 40px;
    }

    h1 {
      font-size: 28px;
      color: #4ff2d1;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #7a8299;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
    }

    .section h2 {
      font-size: 15px;
      color: #3a7bff;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }

    button {
      background: #1a1f2e;
      color: #e8eaf0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover, button:focus {
      background: #252b3b;
      border-color: #3a7bff;
      outline: none;
    }

    button.remote-focused {
      background: #1a4880;
      border-color: #4ff2d1;
      box-shadow: 0 0 0 3px rgba(79, 242, 209, 0.3);
    }

    button.primary {
      background: #1e3a5f;
      border-color: #3a7bff;
      color: #7fc3ff;
      font-weight: 600;
    }

    button.primary:hover, button.primary:focus {
      background: #1a4880;
    }

    button.danger {
      border-color: #ff3ea5;
      color: #ff8cd0;
    }

    button.back {
      background: #1a1f2e;
      border-color: #4ff2d1;
      color: #4ff2d1;
      font-size: 14px;
      padding: 10px 24px;
    }

    #log {
      background: #070910;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px;
      font-family: 'Lucida Console', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
      height: 300px;
      overflow-y: auto;
      color: #b0c0d8;
    }

    .log-info  { color: #4ff2d1; }
    .log-ok    { color: #22c55e; }
    .log-warn  { color: #f59e0b; }
    .log-error { color: #ff6b6b; }

    .preview-wrap {
      margin-top: 12px;
    }

    #screenshot-preview {
      max-width: 100%;
      max-height: 240px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      display: none;
    }

    .hint {
      color: #7a8299;
      font-size: 11px;
      margin-top: 6px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(58,123,255,0.15);
      color: #7fc3ff;
      border: 1px solid rgba(58,123,255,0.3);
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <h1>Tizen B2B API Test <span class="badge">b2bcontrol</span></h1>
  <p class="subtitle">Press <strong style="color:#4ff2d1">1</strong> on the remote while on the player screen · RETURN/BACK to go back</p>

  <div class="grid">

    <!-- Screen Capture -->
    <div class="section">
      <h2>Screen Capture</h2>
      <div class="btn-row">
        <button class="primary" onclick="testCaptureScreen()">captureScreen()</button>
        <button onclick="clearPreview()">Clear</button>
      </div>
      <p class="hint">Saves a PNG to wgt-private storage and returns the path.</p>
      <div class="preview-wrap">
        <img id="screenshot-preview" src="" alt="Screenshot preview" />
        <div id="screenshot-path" style="margin-top:8px; font-size:11px; color:#7a8299; word-break:break-all;"></div>
      </div>
    </div>

    <!-- B2BControl Info -->
    <div class="section">
      <h2>Device Info</h2>
      <div class="btn-row">
        <button onclick="testGetVersion()">getVersion()</button>
        <button onclick="testGetModel()">getModel()</button>
        <button onclick="testGetSerial()">getSerial()</button>
      </div>
      <div class="btn-row">
        <button onclick="testGetPinStatus()">getPinStatus()</button>
        <button onclick="testGetSssp()">detectB2BControl()</button>
      </div>
    </div>

    <!-- Display / Power -->
    <div class="section">
      <h2>Display &amp; Power</h2>
      <div class="btn-row">
        <button onclick="testGetDisplayState()">getDisplayState()</button>
        <button onclick="testGetMagicInfo()">getMagicInfo()</button>
      </div>
      <div class="btn-row">
        <button onclick="testGetPanelOnOff()">isPanelOn()</button>
        <button class="danger" onclick="testTurnPanelOff()">panelOff()</button>
      </div>
      <p class="hint">Panel off: TV stays on, only backlight turns off.</p>
    </div>

    <!-- Input Lock / Lock Status -->
    <div class="section">
      <h2>Lock Status</h2>
      <div class="btn-row">
        <button onclick="testGetIrLock()">getIrLock()</button>
        <button onclick="testGetButtonLock()">getButtonLock()</button>
      </div>
      <div class="btn-row">
        <button onclick="testGetAllLock()">getAllLockState()</button>
        <button onclick="testGetOSD()">getOSDState()</button>
      </div>
    </div>

  </div>

  <!-- Log -->
  <div class="section" style="margin-bottom:20px;">
    <h2>Output Log</h2>
    <div id="log"></div>
    <div class="btn-row" style="margin-top:10px;">
      <button onclick="clearLog()">Clear Log</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="back" onclick="goBack()">&#8592; Back to Player</button>
  </div>

<script>
(function() {
  var logEl = document.getElementById('log');
  var focusableSelectors = 'button';
  var focusedIndex = -1;

  function ts() {
    var d = new Date();
    return '[' + d.toLocaleTimeString() + ']';
  }

  function log(msg, cls) {
    var line = document.createElement('div');
    line.className = cls || '';
    line.textContent = ts() + ' ' + msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  window.clearLog = function() {
    logEl.innerHTML = '';
  };

  function getFocusableElements() {
    return Array.prototype.slice.call(document.querySelectorAll(focusableSelectors)).filter(function(el) {
      return !el.disabled && el.offsetParent !== null;
    });
  }

  function applyFocus(index) {
    var elements = getFocusableElements();
    if (!elements.length) {
      focusedIndex = -1;
      return;
    }

    if (index < 0) index = 0;
    if (index >= elements.length) index = elements.length - 1;

    elements.forEach(function(el) {
      el.classList.remove('remote-focused');
    });

    focusedIndex = index;
    elements[focusedIndex].classList.add('remote-focused');
    elements[focusedIndex].focus();
  }

  function ensureFocus() {
    var elements = getFocusableElements();
    if (!elements.length) {
      return false;
    }

    if (focusedIndex < 0 || focusedIndex >= elements.length || document.activeElement !== elements[focusedIndex]) {
      var activeIndex = elements.indexOf(document.activeElement);
      applyFocus(activeIndex >= 0 ? activeIndex : 0);
    }

    return true;
  }

  function moveFocus(step) {
    var elements = getFocusableElements();
    if (!elements.length) {
      return;
    }

    if (!ensureFocus()) {
      return;
    }

    var nextIndex = focusedIndex + step;
    if (nextIndex < 0) {
      nextIndex = elements.length - 1;
    } else if (nextIndex >= elements.length) {
      nextIndex = 0;
    }

    applyFocus(nextIndex);
  }

  function activateFocused() {
    if (!ensureFocus()) {
      return;
    }

    var elements = getFocusableElements();
    if (focusedIndex >= 0 && focusedIndex < elements.length) {
      elements[focusedIndex].click();
    }
  }

  // ── Navigation ──────────────────────────────────────────────────────────────

  window.goBack = function() {
    try {
      history.back();
    } catch(e) {
      window.location.href = 'index.html';
    }
  };

  document.addEventListener('keydown', function(e) {
    switch (e.keyCode) {
      case 37: // LEFT
      case 38: // UP
        e.preventDefault();
        moveFocus(-1);
        break;

      case 39: // RIGHT
      case 40: // DOWN
        e.preventDefault();
        moveFocus(1);
        break;

      case 13: // ENTER
        e.preventDefault();
        activateFocused();
        break;

      case 10009: // RETURN
      case 10182: // EXIT
        e.preventDefault();
        window.goBack();
        break;
    }
  });

  document.addEventListener('focusin', function(e) {
    var elements = getFocusableElements();
    var nextIndex = elements.indexOf(e.target);
    if (nextIndex >= 0) {
      elements.forEach(function(el) {
        el.classList.remove('remote-focused');
      });
      focusedIndex = nextIndex;
      e.target.classList.add('remote-focused');
    }
  });

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function checkB2B() {
    if (typeof b2bapis === 'undefined') {
      log('b2bapis is NOT available on this device/runtime', 'log-error');
      return false;
    }
    if (!b2bapis.b2bcontrol) {
      log('b2bapis.b2bcontrol is NOT available', 'log-error');
      return false;
    }
    return true;
  }

  // ── Screen Capture ───────────────────────────────────────────────────────────

  window.testCaptureScreen = function() {
    log('Calling b2bapis.b2bcontrol.captureScreen()...', 'log-info');
    if (!checkB2B()) return;

    try {
      b2bapis.b2bcontrol.captureScreen(
        function(path) {
          log('captureScreen SUCCESS → ' + path, 'log-ok');
          document.getElementById('screenshot-path').textContent = 'Saved: ' + path;

          // Try to display the image via the virtual:WidgetData scheme
          var img = document.getElementById('screenshot-preview');
          // Samsung stores wgt-private files accessible via virtual:WidgetData
          // path is typically something like /opt/usr/... or wgt-private/...
          img.src = path;
          img.style.display = 'block';
          img.onerror = function() {
            // Try the widgetdata:// scheme fallback
            var basename = path.split('/').pop();
            img.src = 'widgetdata://' + basename;
            img.onerror = function() {
              log('Preview unavailable (use adb pull "' + path + '" to retrieve)', 'log-warn');
              img.style.display = 'none';
            };
          };
        },
        function(error) {
          log('captureScreen ERROR: ' + (error.name || error.code || JSON.stringify(error)), 'log-error');
        }
      );
    } catch(e) {
      log('captureScreen EXCEPTION: ' + e.message, 'log-error');
    }
  };

  window.clearPreview = function() {
    var img = document.getElementById('screenshot-preview');
    img.style.display = 'none';
    img.src = '';
    document.getElementById('screenshot-path').textContent = '';
  };

  // ── Device Info ──────────────────────────────────────────────────────────────

  window.testGetVersion = function() {
    log('Calling b2bapis.b2bcontrol.getVersion()...', 'log-info');
    if (!checkB2B()) return;
    try {
      b2bapis.b2bcontrol.getVersion(
        function(version) { log('getVersion: ' + JSON.stringify(version), 'log-ok'); },
        function(e) { log('getVersion ERROR: ' + (e.name || e.code), 'log-error'); }
      );
    } catch(e) { log('getVersion EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetModel = function() {
    log('Checking tizen.systeminfo for model...', 'log-info');
    try {
      if (typeof tizen !== 'undefined' && tizen.systeminfo) {
        tizen.systeminfo.getPropertyValue('BUILD',
          function(info) { log('Model: ' + (info.model || 'N/A') + '  BuildVersion: ' + (info.buildVersion || 'N/A'), 'log-ok'); },
          function(e) { log('systeminfo BUILD error: ' + e.message, 'log-error'); }
        );
      } else {
        log('tizen.systeminfo not available', 'log-warn');
      }
    } catch(e) { log('getModel EXCEPTION: ' + e.message, 'log-error'); }

    // Also try b2bcontrol
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getModel === 'function') {
        b2bapis.b2bcontrol.getModel(
          function(m) { log('b2bcontrol.getModel: ' + JSON.stringify(m), 'log-ok'); },
          function(e) { log('b2bcontrol.getModel ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('b2bcontrol.getModel() not in this firmware', 'log-warn');
      }
    } catch(e) { log('b2bcontrol.getModel EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetSerial = function() {
    log('Checking webapis.productinfo for serial...', 'log-info');
    try {
      if (typeof webapis !== 'undefined' && webapis.productinfo) {
        var serial = webapis.productinfo.getDuid();
        log('DUID: ' + serial, 'log-ok');
        var model = webapis.productinfo.getRealModel();
        log('RealModel: ' + model, 'log-ok');
      } else {
        log('webapis.productinfo not available', 'log-warn');
      }
    } catch(e) { log('productinfo EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetPinStatus = function() {
    log('Calling b2bapis.b2bcontrol.getPinStatus()...', 'log-info');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getPinStatus === 'function') {
        b2bapis.b2bcontrol.getPinStatus(
          function(s) { log('getPinStatus: ' + JSON.stringify(s), 'log-ok'); },
          function(e) { log('getPinStatus ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('getPinStatus() not available on this firmware', 'log-warn');
      }
    } catch(e) { log('getPinStatus EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetSssp = function() {
    log('Detecting b2bcontrol availability...', 'log-info');
    var avail = [];
    if (typeof b2bapis !== 'undefined') {
      avail.push('b2bapis');
      if (b2bapis.b2bcontrol) avail.push('b2bapis.b2bcontrol');
    }
    if (typeof webapis !== 'undefined') {
      avail.push('webapis');
      if (webapis.avplay)       avail.push('webapis.avplay');
      if (webapis.productinfo)  avail.push('webapis.productinfo');
      if (webapis.avplaystore)  avail.push('webapis.avplaystore');
    }
    log('Available: ' + (avail.length ? avail.join(', ') : 'none'), avail.length ? 'log-ok' : 'log-error');

    // List b2bcontrol method names if available
    if (typeof b2bapis !== 'undefined' && b2bapis.b2bcontrol) {
      var methods = [];
      for (var k in b2bapis.b2bcontrol) {
        if (typeof b2bapis.b2bcontrol[k] === 'function') methods.push(k);
      }
      log('b2bcontrol methods: ' + (methods.length ? methods.join(', ') : '(none found)'), 'log-info');
    }
  };

  // ── Display / Power ───────────────────────────────────────────────────────────

  window.testGetDisplayState = function() {
    log('Checking display state via tizen.tvinfo...', 'log-info');
    try {
      if (typeof tizen !== 'undefined' && tizen.tvinfo) {
        var val = tizen.tvinfo.getMenuValue(tizen.tvinfo.TvInfoMenuKey.PICTURE_MODE);
        log('PICTURE_MODE: ' + val, 'log-ok');
      } else {
        log('tizen.tvinfo not available', 'log-warn');
      }
    } catch(e) { log('tvinfo EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetMagicInfo = function() {
    log('Calling b2bapis.b2bcontrol.getMagicInfoAgentStatus()...', 'log-info');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getMagicInfoAgentStatus === 'function') {
        b2bapis.b2bcontrol.getMagicInfoAgentStatus(
          function(s) { log('MagicInfo status: ' + JSON.stringify(s), 'log-ok'); },
          function(e) { log('getMagicInfoAgentStatus ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('getMagicInfoAgentStatus() not available', 'log-warn');
      }
    } catch(e) { log('getMagicInfoAgentStatus EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetPanelOnOff = function() {
    log('Calling b2bapis.b2bcontrol.getPanelMuteStatus()...', 'log-info');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getPanelMuteStatus === 'function') {
        b2bapis.b2bcontrol.getPanelMuteStatus(
          function(s) { log('Panel mute status: ' + JSON.stringify(s), 'log-ok'); },
          function(e) { log('getPanelMuteStatus ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('getPanelMuteStatus() not available', 'log-warn');
      }
    } catch(e) { log('getPanelMuteStatus EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testTurnPanelOff = function() {
    if (!confirm('Turn panel off? (video stays on, just backlight off)')) return;
    log('Calling b2bapis.b2bcontrol.setPanelMuteStatus(true)...', 'log-warn');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.setPanelMuteStatus === 'function') {
        b2bapis.b2bcontrol.setPanelMuteStatus(
          true,
          function() { log('setPanelMuteStatus(true) SUCCESS', 'log-ok'); },
          function(e) { log('setPanelMuteStatus ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('setPanelMuteStatus() not available', 'log-warn');
      }
    } catch(e) { log('setPanelMuteStatus EXCEPTION: ' + e.message, 'log-error'); }
  };

  // ── Lock Status ───────────────────────────────────────────────────────────────

  window.testGetIrLock = function() {
    log('Calling b2bapis.b2bcontrol.getIRReceiverStatus()...', 'log-info');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getIRReceiverStatus === 'function') {
        b2bapis.b2bcontrol.getIRReceiverStatus(
          function(s) { log('IR receiver: ' + JSON.stringify(s), 'log-ok'); },
          function(e) { log('getIRReceiverStatus ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('getIRReceiverStatus() not available', 'log-warn');
      }
    } catch(e) { log('getIRReceiverStatus EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetButtonLock = function() {
    log('Calling b2bapis.b2bcontrol.getLocalButtonStatus()...', 'log-info');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getLocalButtonStatus === 'function') {
        b2bapis.b2bcontrol.getLocalButtonStatus(
          function(s) { log('Local button lock: ' + JSON.stringify(s), 'log-ok'); },
          function(e) { log('getLocalButtonStatus ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('getLocalButtonStatus() not available', 'log-warn');
      }
    } catch(e) { log('getLocalButtonStatus EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetAllLock = function() {
    log('Calling b2bapis.b2bcontrol.getAllLockState()...', 'log-info');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getAllLockState === 'function') {
        b2bapis.b2bcontrol.getAllLockState(
          function(s) { log('All lock state: ' + JSON.stringify(s), 'log-ok'); },
          function(e) { log('getAllLockState ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('getAllLockState() not available — trying getSystemLockStatus()', 'log-warn');
        if (typeof b2bapis.b2bcontrol.getSystemLockStatus === 'function') {
          b2bapis.b2bcontrol.getSystemLockStatus(
            function(s) { log('systemLockStatus: ' + JSON.stringify(s), 'log-ok'); },
            function(e) { log('getSystemLockStatus ERROR: ' + (e.name||e.code), 'log-error'); }
          );
        } else {
          log('Neither getAllLockState nor getSystemLockStatus available', 'log-error');
        }
      }
    } catch(e) { log('getAllLockState EXCEPTION: ' + e.message, 'log-error'); }
  };

  window.testGetOSD = function() {
    log('Calling b2bapis.b2bcontrol.getOSDStatus()...', 'log-info');
    if (!checkB2B()) return;
    try {
      if (typeof b2bapis.b2bcontrol.getOSDStatus === 'function') {
        b2bapis.b2bcontrol.getOSDStatus(
          function(s) { log('OSD status: ' + JSON.stringify(s), 'log-ok'); },
          function(e) { log('getOSDStatus ERROR: ' + (e.name||e.code), 'log-error'); }
        );
      } else {
        log('getOSDStatus() not available', 'log-warn');
      }
    } catch(e) { log('getOSDStatus EXCEPTION: ' + e.message, 'log-error'); }
  };

  // ── Auto-detect on load ──────────────────────────────────────────────────────

  window.addEventListener('load', function() {
    log('test-tizen.html loaded — b2bcontrol privilege: http://developer.samsung.com/privilege/b2bcontrol', 'log-info');
    log('Click "detectB2BControl()" to discover available APIs', 'log-info');
    applyFocus(0);
  });

})();
</script>
</body>
</html>
