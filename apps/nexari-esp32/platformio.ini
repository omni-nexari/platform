; ──────────────────────────────────────────────────────────────────────────────
; Nexari ESP32 — T-Display S3 AMOLED (1.91", non-touch)
; ──────────────────────────────────────────────────────────────────────────────
[platformio]
default_envs = nexari-esp32-dev
boards_dir   = boards

[env]
platform      = espressif32@6.12.0
board         = T-Display-AMOLED
framework     = arduino
upload_speed  = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -Isrc
lib_deps =
    bxparks/AceButton @ 1.10.1
    lvgl/lvgl @ 8.4.0
    lewisxhe/XPowersLib @ 0.2.7
    lewisxhe/SensorLib @ 0.2.4
    bodmer/TFT_eSPI @ 2.5.31
    links2004/WebSockets @ 2.4.1
    bblanchon/ArduinoJson @ 7.3.1
    https://github.com/Xinyuan-LilyGO/LilyGo-AMOLED-Series.git
monitor_filters =
    default
    esp32_exception_decoder

; ── DEV — LAN 192.168.1.17, HTTP, no TLS ─────────────────────────────────────
[env:nexari-esp32-dev]
extends = env
build_flags =
    ${env.build_flags}
    '-DDEFAULT_API_HOST="192.168.1.17"'
    -DDEFAULT_API_PORT=80
    -DDEFAULT_API_HTTPS=0
    '-DBUILD_ENV="dev"'
    -g3
    -DCORE_DEBUG_LEVEL=3

; ── PROD — ds.chiho.app, HTTPS/WSS ───────────────────────────────────────────
[env:nexari-esp32-prod]
extends = env
build_flags =
    ${env.build_flags}
    '-DDEFAULT_API_HOST="ds.chiho.app"'
    -DDEFAULT_API_PORT=443
    -DDEFAULT_API_HTTPS=1
    '-DBUILD_ENV="prod"'
