# ─────────────────────────────────────────────────────────────────────────────
# Nexari Platform — Docker Compose stack
#
# Services:
#   api       — Node.js API + serves DS SPA static files
#   postgres  — PostgreSQL 17 database
#   redis     — Redis 7 cache + queue backend
#   nginx     — Reverse proxy, TLS termination, static file serving
#   certbot   — Let's Encrypt certificate management
#
# Usage:
#   Install:  bash install.sh
#   Update:   bash update.sh
#   Logs:     docker compose logs -f api
#   Shell:    docker compose exec api sh
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 17 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: signage
      POSTGRES_USER: signage
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Improves write performance — crash safety is handled by regular backups
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signage -d signage"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Not exposed to the host — only reachable from within the compose network
    networks:
      - internal

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --appendonly yes
      --bind 0.0.0.0
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal

  # ── Nexari Platform API ──────────────────────────────────────────────────────
  api:
    image: ghcr.io/omni-nexari/platform:${NEXARI_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # These are fixed by the compose layout — not in .env
      DATABASE_URL: postgresql://signage:${DB_PASSWORD}@postgres:5432/signage
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STORAGE_ROOT: /var/signage/uploads
      PLAYER_BUILDS_ROOT: /var/nexari/player-builds
      PLAYWRIGHT_BROWSERS_PATH: /opt/playwright-browsers
    volumes:
      - uploads:/var/signage/uploads
      - tizen:/var/signage/tizen
      - android:/var/signage/android
      - /var/nexari/player-builds:/var/nexari/player-builds
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/v1/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - internal
      - external
    # Expose to nginx but not directly to the host
    expose:
      - "3000"

  # ── DS static file initialiser ─────────────────────────────────────────────
  # Copies the pre-built DS SPA from the API image into the ds_static volume
  # so nginx can serve it. Runs once and exits.
  ds-init:
    image: ghcr.io/omni-nexari/platform:${NEXARI_VERSION:-latest}
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "cp -r /app/apps/ds/dist/. /var/www/ds/ && echo 'DS static files copied'"]
    volumes:
      - ds_static:/var/www/ds
    networks:
      - internal

  # ── nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NEXARI_HTTP_BIND:-0.0.0.0}:${NEXARI_HTTP_PORT:-80}:80"
      - "${NEXARI_HTTPS_BIND:-0.0.0.0}:${NEXARI_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # DS static files are served by nginx directly (faster than proxying to api)
      - ds_static:/var/www/ds:ro
      # Certbot challenge + certs
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      # Uploads served directly by nginx via internal X-Accel-Redirect
      - uploads:/var/signage/uploads:ro
      # Player builds served directly by nginx (WGT, APK, EXE, BIN)
      - /var/nexari/player-builds:/var/nexari/player-builds:ro
    depends_on:
      - api
      - ds-init
    networks:
      - internal
      - external

  # ── Certbot (Let's Encrypt TLS) ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # certbot is only run on-demand; the container exits immediately otherwise
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h; done"
    profiles:
      - tls

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  tizen:
    driver: local
  android:
    driver: local
  ds_static:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
