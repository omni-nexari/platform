name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*'           # triggers on v1.0.0, v2.3.1, etc.
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI
    inputs:
      tag:
        description: 'Image tag to publish (e.g. latest, v1.2.3)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: omni-nexari/platform

jobs:
  build-and-push:
    name: Build and push multi-platform image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag push: v1.2.3 → 1.2.3 + v1.2.3 + 1.2 + latest
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            # manual dispatch: use input tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            # main branch pushes (non-tag): edge
            type=edge,branch=main

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_PLAYWRIGHT=0

  release-package:
    name: Upload install package to GitHub Release
    runs-on: ubuntu-latest
    # Only run on real version tags, not workflow_dispatch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package docker/ directory
        run: |
          mkdir -p _pkg/nexari
          cp docker/docker-compose.yml \
             docker/nginx.conf.template \
             docker/.env.template \
             docker/generate-keys.sh \
             docker/install.sh \
             docker/update.sh \
             _pkg/nexari/
          chmod +x _pkg/nexari/generate-keys.sh _pkg/nexari/install.sh _pkg/nexari/update.sh
          tar -czf nexari-install.tar.gz -C _pkg nexari

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nexari-install.tar.gz
