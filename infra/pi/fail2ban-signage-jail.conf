# fail2ban jail definition for the Signage superadmin login endpoint.
# Bans an IP for 10 minutes after 5 failed superadmin login attempts in 60 s.
[signage-superadmin]
enabled  = true
port     = http,https
filter   = signage-superadmin
logpath  = /var/log/nginx/access.log
maxretry = 5
findtime = 60
bantime  = 600
