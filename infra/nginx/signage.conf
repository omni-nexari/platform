# ──────────────────────────────────────────────────────────────────────────────
# Signage nginx config
#
# Serves:
#   https://ds.chiho.app        — TLS (certbot manages certs)
#   http://192.168.1.17         — LAN access (no TLS)
#
# After installing, run:
#   sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# ── WebSocket upgrade map ─────────────────────────────────────────────────────
# $http_upgrade is empty for normal requests; the map sets the correct
# Connection header so keepalive isn't broken for regular API calls.
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ''        close;
}

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream signage_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Cloudflare real-IP restoration ───────────────────────────────────────────
# Cloudflare sits in front; restore the visitor's actual IP from CF-Connecting-IP.
# Keep this list current: https://www.cloudflare.com/ips/
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header   CF-Connecting-IP;

# ── HTTP → HTTPS redirect for ds.chiho.app ────────────────────────────────────
# certbot will manage this block; scaffold it here so the file is valid before
# certbot runs for the first time.
server {
    listen 80;
    listen [::]:80;
    server_name ds.chiho.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — ds.chiho.app ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ds.chiho.app;

    # TLS — managed by certbot; paths added/replaced by certbot automatically
    ssl_certificate     /etc/letsencrypt/live/ds.chiho.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ds.chiho.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/signage/apps/ds/dist;
    index index.html;

    # Allow large file uploads (videos, etc.) — API enforces its own 2 GB limit
    client_max_body_size 2g;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # 'nonce-$request_id' replaces 'unsafe-inline' — nginx sub_filter stamps the same
    # value into the built index.html at serve time (see the SPA fallback location below).
    # 'unsafe-eval' is still required by @monaco-editor/react's TypeScript language service.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'nonce-$request_id' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' wss://ds.chiho.app https://ds.chiho.app; frame-ancestors 'self';" always;

    # ── HTML5 package serve — allow embedding in TV player iframes ───────────
    # This path is JWT-token-gated (token in the URL path itself).  Override the
    # global X-Frame-Options + CSP frame-ancestors so Tizen/WebOS WGT apps
    # (origin: app:// or file://) can load the package in an iframe.
    # NOTE: because this block has its own add_header directives, NGINX will NOT
    # inherit the parent-level add_header directives (per NGINX inheritance rules).
    # We explicitly carry over the other security headers we still want.
    location ~ ^/api/v1/devices/device/content/[^/]+/html5/ {
        proxy_pass         http://signage_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Security headers retained:
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        # Omit X-Frame-Options entirely; allow framing from any origin:
        add_header Content-Security-Policy   "frame-ancestors *;" always;
    }

    # ── API proxy — preserve /api prefix (API registers at /api/v1/) ─────────
    location /api/ {
        proxy_pass         http://signage_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── WebSocket — notification stream ─────────────────────────────────────
    location /api/v1/notifications/ws {
        proxy_pass         http://signage_api/api/v1/notifications/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket — live log tail ────────────────────────────────────────────
    location /api/v1/logs/tail {
        proxy_pass         http://signage_api/api/v1/logs/tail;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket — device player connections ────────────────────────────────
    location /api/v1/devices/ws/ {
        proxy_pass         http://signage_api/api/v1/devices/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── WebSocket — cross-platform sync relay ────────────────────────────────
    location /api/v1/sync-relay {
        proxy_pass         http://signage_api/api/v1/sync-relay;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── Uploaded media files ──────────────────────────────────────────────────
    location /uploads/ {
        alias /var/signage/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Tizen .wgt + sssp_config.xml ─────────────────────────────────────────
    location /tizen/ {
        alias /var/signage/tizen/;
        autoindex off;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        types { application/widget wgt; }
        default_type application/octet-stream;
    }
    # ── Android player APK + OTA manifest + DPC provisioning JSON ──────────────────
    # Hosts: nexari-android-latest.apk, update.json, dpc-provisioning.json,
    # plus per-version archives at /android/v<x.y.z>/. Mirrors the /tizen layout.
    location /android/ {
        alias /var/signage/android/;
        autoindex off;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        types {
            application/vnd.android.package-archive apk;
            application/json                         json;
        }
        default_type application/octet-stream;
    }
    # ── SPA fallback ──────────────────────────────────────────────────────────
    # sub_filter replaces the VITE_NONCE placeholder (stamped by cspNoncePlugin at
    # build time) with the per-request $request_id that matches the CSP nonce above.
    location / {
        sub_filter 'nonce="VITE_NONCE"' 'nonce="$request_id"';
        sub_filter_once off;
        try_files $uri $uri/ /index.html;
    }
}

