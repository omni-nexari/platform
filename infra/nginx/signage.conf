# ── LAN access (192.168.1.17) ────────────────────────────────────────────────
server {
  listen 80;
  server_name 192.168.1.17;
  client_max_body_size 2048m;

  location /api/notifications/ws {
    proxy_pass http://127.0.0.1:3000/api/v1/notifications/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3000/api/v1/;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://127.0.0.1:3000/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  location /uploads/ {
    alias /var/signage/uploads/;
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  # Tizen app files — WGT download + sssp_config.xml for SSSP launcher
  # TV launcher URL: http://192.168.1.17/tizen/sssp_config.xml
  location /tizen/ {
    alias /var/signage/tizen/;
    autoindex off;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Access-Control-Allow-Origin "*";
  }

  location / {
    root /opt/signage/apps/ds/dist;
    try_files $uri $uri/ /index.html;
  }
}

