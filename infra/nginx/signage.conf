# ──────────────────────────────────────────────────────────────────────────────
# Signage nginx config
#
# Serves:
#   https://ds.chiho.app        — TLS (certbot manages certs)
#   http://192.168.1.17         — LAN access (no TLS)
#
# After installing, run:
#   sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream signage_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect for ds.chiho.app ────────────────────────────────────
# certbot will manage this block; scaffold it here so the file is valid before
# certbot runs for the first time.
server {
    listen 80;
    listen [::]:80;
    server_name ds.chiho.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — ds.chiho.app ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ds.chiho.app;

    # TLS — managed by certbot; paths added/replaced by certbot automatically
    ssl_certificate     /etc/letsencrypt/live/ds.chiho.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ds.chiho.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/signage/apps/ds/dist;
    index index.html;

    # ── API proxy — strip /api prefix before forwarding ─────────────────────
    location /api/ {
        proxy_pass         http://signage_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://signage_api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Uploaded media files ──────────────────────────────────────────────────
    location /uploads/ {
        alias /var/signage/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Tizen .wgt + sssp_config.xml ─────────────────────────────────────────
    location /tizen/ {
        alias /var/signage/tizen/;
        autoindex off;
        add_header Cache-Control "no-cache";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── LAN access — 192.168.1.17 (HTTP only, no TLS) ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 192.168.1.17;

    root /opt/signage/apps/ds/dist;
    index index.html;

    location /api/ {
        proxy_pass         http://signage_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass         http://signage_api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    location /uploads/ {
        alias /var/signage/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /tizen/ {
        alias /var/signage/tizen/;
        autoindex off;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
